events {
  worker_connections 1024;
}

http {
  upstream api      { server api:3001; }
  upstream frontend { server frontend:3000; }

  limit_req_zone $binary_remote_addr zone=widget:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=login:10m  rate=1r/m;
  limit_req_zone $binary_remote_addr zone=ingest:10m rate=120r/m;

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "SAMEORIGIN"                      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "1; mode=block"                   always;

    client_max_body_size 1m;

    # Public widget page — allow iframe embedding from any origin
    location /widget {
      add_header X-Frame-Options "" always;
      add_header Content-Security-Policy "frame-ancestors *" always;
      proxy_pass http://frontend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public API for widget — open CORS, rate limited
    location /api/v1/public/ {
      limit_req zone=widget burst=20 nodelay;
      add_header X-Frame-Options        "" always;
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
      proxy_pass http://api;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Jetson ingest — rate limited
    location /api/v1/ingest/ {
      limit_req zone=ingest burst=30 nodelay;
      proxy_pass http://api;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login — brute-force rate limit
    location /api/v1/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass http://api;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API routes
    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (catch-all)
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
